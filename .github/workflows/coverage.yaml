name: Coverage
on:
  push:
    branches:
      - coverage_pages
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  Linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['8.3']
        type: ['cli', 'zts']
        distro: ['bookworm']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup buildx
        uses: docker/setup-buildx-action@v3
      - name: Build container
        run: |
          docker compose build --pull --no-cache --build-arg PLATFORM="linux/amd64" --build-arg IMAGE="php" --build-arg TAG="${{ matrix.version }}-${{ matrix.type }}-${{ matrix.distro }}"
      - name: Test with gcov
        run: |
          docker compose run -v "$(pwd)/ext:/ext" --rm shell pskel coverage
      - name: Upload coverage to artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.version }}-${{ matrix.type }}-${{ matrix.distro }}
          path: ${{ github.workspace }}/ext/lcov.info
  CoveragePullRequest:
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: write
    runs-on: ubuntu-latest
    needs: [Linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
      - name: Merge coverages
        run: |
          sudo apt-get install -y "lcov"
          LCOV_FILES="$(find . -name "lcov.info")"
          CMD="$(which "lcov")"
          for LCOV_FILE in ${LCOV_FILES}; do
            CMD+=" -a ${LCOV_FILE}"
          done
          CMD+=" -o lcov.info"
          echo "Merging coverages: ${LCOV_FILES}"
          ${CMD}
      - name: Fix path in coverage
        run: sed -i 's|SF:/ext|SF:./ext|g' "lcov.info"
      - name: Report coverage
        uses: k1LoW/octocov-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: .github/octocov.yml
  CoverageWithReport:
    if: github.event_name == 'push' && github.ref == 'refs/heads/coverage_pages'
    permissions:
        pages: write
        id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [Linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
      - name: Merge coverages
        run: |
          sudo apt-get install -y "lcov"
          LCOV_FILES="$(find . -name "lcov.info")"
          CMD="$(which "lcov")"
          for LCOV_FILE in ${LCOV_FILES}; do
            CMD+=" -a ${LCOV_FILE}"
          done
          CMD+=" -o lcov.info"
          echo "Merging coverages: ${LCOV_FILES}"
          ${CMD}
      - name: Fix path in coverage
        run: sed -i 's|SF:/ext|SF:./ext|g' "lcov.info"
      - name: Generate coverage HTML by genhtml
        run: genhtml --output-directory "coverage_report" "lcov.info"
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'coverage_report'
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
